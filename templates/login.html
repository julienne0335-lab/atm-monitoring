{% extends "base.html" %}
{% block title %}로그인 - ATM 모니터링{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4 col-sm-8 col-11">

        <!-- 로고 영역 -->
        <div class="text-center mb-4">
            <i class="bi bi-bank text-warning" style="font-size: 3rem;"></i>
            <h4 class="mt-2 fw-bold">ATM 운영 모니터링</h4>
            <p class="text-muted small">관리자 전용 시스템</p>
        </div>

        <!-- 로그인 카드 -->
        <div class="card border-secondary" id="login-card">
            <div class="card-body p-4">

                {# method="POST" → 같은 URL(/login)로 POST 요청 전송 #}
                <form method="POST">

                    <div class="mb-3">
                        <label for="login_id" class="form-label text-muted small">아이디</label>
                        <input
                            type="text"
                            id="login_id"
                            name="login_id"         {# name이 request.form.get("login_id")의 키 #}
                            class="form-control"
                            placeholder="로그인 아이디"
                            required
                            autofocus
                        >
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label text-muted small">비밀번호</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-control"
                            placeholder="비밀번호"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-warning w-100 fw-bold">
                        <i class="bi bi-box-arrow-in-right me-1"></i>로그인
                    </button>

                </form>
            </div>
        </div>

        <p class="text-center text-muted small mt-3">
            ATM 운영 현황 모니터링 시스템 · 팀 프로젝트
        </p>

    </div>
</div>
{% endblock %}
